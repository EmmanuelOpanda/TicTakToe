<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

</head>

<body>
    <h1 style="cursor: pointer;" class="title">Tic -tak-toe</h1>

    <h4>player: <span class="player-ph">1</span></h4>

    <div class="row-container">
        <div class="square c0" onclick="onCellClick(0)"></div>
        <div class="square c1" onclick="onCellClick(1)"></div>
        <div class="square c2" onclick="onCellClick(2)"></div>
    </div>
    <div class="row-container">
        <div class="square c3" onclick="onCellClick(3)"></div>
        <div class="square c4" onclick="onCellClick(4)"></div>
        <div class="square c5" onclick="onCellClick(5)"></div>
    </div>
    <div class="row-container">
        <div class="square c6" onclick="onCellClick(6)"></div>
        <div class="square c7" onclick="onCellClick(7)"></div>
        <div class="square c8" onclick="onCellClick(8)"></div>
    </div>




    <script src="index.js"></script>
</body>

</html>
